name: gitleaks

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"   # weekly Mon 08:00 UTC — full-history rescan

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
