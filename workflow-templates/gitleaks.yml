name: gitleaks

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"   # weekly Mon 08:00 UTC — full-history rescan

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install gitleaks binary
        # Using the binary directly avoids the gitleaks-action v2 license requirement
        # introduced in 2024 (breaking change for GitHub orgs).
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar xzf gitleaks_8.21.2_linux_x64.tar.gz
      - name: Scan for secrets
        run: ./gitleaks detect --source . --verbose --no-banner --exit-code 1
